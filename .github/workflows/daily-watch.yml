name: Daily Signal Watch

# The engine runs as a monitor: every morning it watches the German job market
# for S1 (ERP/S4 transformation) signals, classifies, briefs, finds people,
# generates the lead magnets and commits the day's artifacts. The commit
# history of runs/ is the proof that this is a running system.
#
# State persists between runs via the Actions cache (private storage), so the
# database accumulates day over day: cross-day dedupe works and the cockpit on
# GitHub Pages grows cumulatively. Committed artifacts stay person-redacted
# (REDACT_PEOPLE=1); full person data lives only in the private cache and in
# the CRM. If the cache ever expires, the engine rebuilds from a fresh window.

on:
  schedule:
    # Off-peak minute on purpose: round-hour crons queue behind everyone
    # else's and fire hours late. 03:47 UTC ≈ 05:47 CEST.
    - cron: "47 3 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days (actor accepts 1/3/7)"
        default: "3"

concurrency:
  group: daily-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EXA_AI_API_KEY: ${{ secrets.EXA_AI_API_KEY }}
      HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
      REDACT_PEOPLE: "1"
      DAYS: ${{ github.event.inputs.days || '3' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Restore engine state
        uses: actions/cache/restore@v4
        with:
          path: data/engine.sqlite
          key: engine-db-${{ github.run_id }}
          restore-keys: engine-db-
      - name: Watch job boards
        run: npx tsx src/cli.ts watch --days "$DAYS" --max-items 50
      - name: Classify signals
        run: npx tsx src/cli.ts classify --max 120
      - name: Generate briefs
        run: npx tsx src/cli.ts brief --max 25
      - name: Generate lead magnets
        run: npx tsx src/cli.ts magnet --max 25
      - name: Re-render all magnets on the current template
        run: npx tsx scripts/rerender-magnets.ts
      - name: Discover people
        run: npx tsx src/cli.ts people --max 15
      - name: Route new signals into HubSpot (drafts + tasks, never sends)
        run: npx tsx src/cli.ts route --max 30
      - name: Export signals (json + csv)
        run: npx tsx src/cli.ts export
      - name: Render cumulative cockpit for GitHub Pages
        run: |
          npx tsx src/cli.ts cockpit
          npx tsx src/cli.ts cockpit --out docs/index.html
          DAY=$(date -u +%F)
          mkdir -p docs/runs
          rm -rf "docs/runs/$DAY"
          cp -r "runs/$DAY" "docs/runs/$DAY"
      - name: Save engine state
        uses: actions/cache/save@v4
        with:
          path: data/engine.sqlite
          key: engine-db-${{ github.run_id }}
      - name: Commit the day's artifacts
        run: |
          git config user.name "archivox-signal-engine"
          git config user.email "actions@users.noreply.github.com"
          git add runs/ docs/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Daily watch: $(date -u +%F)"
          git pull --rebase
          git push
